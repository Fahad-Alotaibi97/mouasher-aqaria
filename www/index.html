<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>مؤشر العقارية</title>
  <style>
    html, body { margin: 0; height: 100%; background: #F6FAFE; color: #131b2e;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; text-align: center; padding: 24px; }
    .dot { width: 44px; height: 44px; border-radius: 50%;
      border: 4px solid #C9A84C; border-top-color: transparent; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .t { font-size: 18px; font-weight: 700; }
    .s { font-size: 13px; color: #45464d; max-width: 280px; line-height: 1.6; }
  </style>
</head>
<body>
  <!-- صفحة احتياطية فقط: التطبيق يحمّل الموقع الحيّ عبر server.url. تظهر هذه
       الشاشة لحظة الإقلاع أو إن تعذّر الوصول للإنترنت. -->
  <div class="wrap">
    <div class="dot"></div>
    <div class="t">مؤشر العقارية</div>
    <div class="s">جارٍ تحميل المنصّة… تأكّد من اتصالك بالإنترنت.</div>
  </div>
</body>
</html>
