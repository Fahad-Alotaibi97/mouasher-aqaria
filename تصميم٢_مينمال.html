<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>مؤشر العقارية — مينمال</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--ink:#0A0A0A;--mut:#777;--line:#EAEAEA;--acc:#E0322D;--hi:#D6332C;--ok:#0A0A0A;--lo:#178A4E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
.wrap{max-width:760px;margin:0 auto;padding:0 24px}
header{border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:72px}
.logo{font-weight:900;font-size:19px;letter-spacing:-.5px}.logo i{color:var(--acc);font-style:normal}
.nav a{color:var(--ink);font-size:14px;font-weight:700;text-decoration:none;border-bottom:2px solid var(--ink);padding-bottom:2px}
.hero{padding:90px 0 30px;text-align:center}
.hero h1{font-size:clamp(40px,8vw,76px);font-weight:900;letter-spacing:-2px;line-height:1.05}
.hero h1 em{font-style:normal;color:var(--acc)}
.hero p{color:var(--mut);font-size:18px;margin-top:20px}
.tool{max-width:560px;margin:48px auto 0}
.tool .row{display:flex;border:2px solid var(--ink);overflow:hidden}
.tool select,.tool input{flex:1;border:0;padding:20px 16px;font-family:inherit;font-size:17px;outline:none;background:#fff;color:var(--ink);min-width:0}
.tool select{border-left:2px solid var(--ink)}
.tool .go{background:var(--ink);color:#fff;border:0;font-family:inherit;font-weight:900;font-size:17px;padding:0 28px;cursor:pointer}
.tool .go:hover{background:var(--acc)}
.result{text-align:center;margin:64px 0;min-height:40px}
.result .word{font-size:clamp(60px,14vw,120px);font-weight:900;letter-spacing:-3px;line-height:1}
.result .scale{max-width:420px;margin:30px auto 0;display:flex;align-items:center;gap:0}
.result .seg{height:3px;flex:1;background:var(--line);position:relative}
.result .seg.act{background:var(--ink)}
.result .lab{display:flex;justify-content:space-between;max-width:420px;margin:14px auto 0;font-size:13px;color:var(--mut);font-weight:700}
.result .msg{color:var(--mut);font-size:16px;margin-top:24px}
.rule{height:1px;background:var(--line);margin:0}
.sec{padding:60px 0}
.sec .h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.sec .h h2{font-size:26px;font-weight:900;letter-spacing:-1px}
.sec .h span{font-size:13px;color:var(--mut);font-weight:700}
.lst{border-top:2px solid var(--ink)}
.it{display:flex;align-items:center;gap:18px;padding:22px 4px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
.it:hover{padding-right:12px}
.it .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.it .m{flex:1}.it .m h3{font-size:17px;font-weight:800}.it .m p{font-size:13px;color:var(--mut)}
.it .pr{text-align:left}.it .pr b{font-size:20px;font-weight:900;display:block}.it .pr span{font-size:12px;color:var(--mut)}
.it .vt{font-weight:800;font-size:15px;width:54px;text-align:left}
footer{border-top:2px solid var(--ink);padding:34px 0;font-size:13px;color:var(--mut);text-align:center}
.note{font-size:12px;color:var(--mut);margin-top:10px}
</style></head>
<body>
<header><div class="wrap nav">
  <div class="logo">مؤشر<i>.</i> العقارية</div>
  <a href="#list">الإعلانات</a>
</div></header>

<div class="wrap">
  <div class="hero">
    <h1>هل إيجارك <em>عادل</em>؟</h1>
    <p>سؤال واحد. إجابة واحدة. في ثوانٍ.</p>
    <div class="tool">
      <div class="row">
        <button class="go" onclick="run()">احسب</button>
        <input id="price" type="number" placeholder="الإيجار السنوي">
        <select id="hood"></select>
      </div>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<div class="rule"></div>

<section class="wrap sec" id="list">
  <div class="h"><h2>إعلانات</h2><span>السعر · الحكم</span></div>
  <div class="lst" id="lst"></div>
</section>

<footer><div class="wrap">© ٢٠٢٦ مؤشر العقارية<div class="note">نموذج تصميمي — أرقام توضيحية تُستبدل ببيانات المؤشر الإيجاري الرسمية.</div></div></footer>

<script>
const HOODS={'النرجس':65000,'العليا':52000,'الملقا':60000,'حطين':58000,'الياسمين':54000,'القيروان':58000,'النخيل':59000,'إشبيلية':38000,'الصحافة':57000,'الغدير':62000};
const C={hi:'#D6332C',ok:'#0A0A0A',lo:'#178A4E'},L={hi:'مرتفع',ok:'عادل',lo:'فرصة'};
const sel=document.getElementById('hood');Object.keys(HOODS).forEach(h=>sel.add(new Option(h,h)));
const fmt=n=>n.toLocaleString('ar-SA');
function judge(p,a){const r=p/a;if(r>1.12)return{st:'hi',seg:2};if(r<.85)return{st:'lo',seg:0};return{st:'ok',seg:1}}
function run(){
  const h=sel.value,p=parseInt(document.getElementById('price').value)||0,a=HOODS[h],r=document.getElementById('result');
  if(!p){r.innerHTML='';return}
  const j=judge(p,a),c=C[j.st],d=Math.abs(p-a);
  const msg=j.st==='hi'?('أعلى بـ '+fmt(d)+' ريال عن متوسط '+h+' ('+fmt(a)+').'):j.st==='lo'?('أقل بـ '+fmt(d)+' ريال عن متوسط '+h+' — فرصة.'):('يطابق تقريباً متوسط '+h+' ('+fmt(a)+' ريال).');
  r.innerHTML='<div class="word" style="color:'+c+'">'+L[j.st]+'</div>'+
   '<div class="scale">'+[0,1,2].map(i=>'<div class="seg '+(i===j.seg?'act':'')+'"></div>').join('')+'</div>'+
   '<div class="lab"><span>فرصة</span><span>عادل</span><span>مرتفع</span></div>'+
   '<div class="msg">'+msg+'</div>';
}
const LST=[{h:'النرجس',t:'شقة ٣ غرف',ty:'شقة',p:90000},{h:'الملقا',t:'شقة ٣ غرف · ١٢٠م²',ty:'شقة',p:48000},{h:'حطين',t:'استوديو مؤثث',ty:'استوديو',p:50400},{h:'العليا',t:'شقة غرفتين',ty:'شقة',p:52000},{h:'القيروان',t:'شقة ٣ غرف',ty:'شقة',p:38000},{h:'النخيل',t:'فيلا ٥ غرف',ty:'فيلا',p:140000},{h:'إشبيلية',t:'شقة غرفتين',ty:'شقة',p:36000}];
const MUL={'فيلا':2.2,'استوديو':.55,'شقة':1};
const lst=document.getElementById('lst');
LST.forEach(l=>{const f=Math.round(HOODS[l.h]*(MUL[l.ty]||1)),j=judge(l.p,f),c=C[j.st];
 const el=document.createElement('div');el.className='it';
 el.innerHTML='<span class="dot" style="background:'+c+'"></span><div class="m"><h3>'+l.t+'</h3><p>'+l.h+' · العادل ≈ '+fmt(f)+'</p></div>'+
 '<div class="pr"><b>'+fmt(l.p)+'</b><span>ريال/سنة</span></div><div class="vt" style="color:'+c+'">'+L[j.st]+'</div>';
 lst.appendChild(el)});
</script>
</body></html>
